services:
  # --- Graph database ---
  neo4j:
    image: neo4j:5.15.0-community
    container_name: dubai_neo4j_db
    hostname: dubai_neo4j_db
    extra_hosts:
      - "dubai_neo4j_db:127.0.0.1"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    networks:
      - dubai_network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- LangGraph sync worker ---
  sync_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dubai_sync_agent_worker
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - dubai_network

  # --- FastAPI REST gateway ---
  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dubai_rest_api_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    command: uv run uvicorn api_service:app --host 0.0.0.0 --port 8000
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - dubai_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Next.js responsive frontend ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dubai_web
    ports:
      - "3000:8080"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - api_gateway
    networks:
      - dubai_network

networks:
  dubai_network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
