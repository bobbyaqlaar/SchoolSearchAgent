name: CI — Unit, Frontend & LLM Evals

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  # --- Backend unit tests: fully mocked, no live API keys ---
  unit-tests:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync dependencies (incl. providers + evals)
        run: uv sync --frozen --extra providers --extra evals
      - name: Run pytest
        run: uv run pytest -v

  # --- Frontend: install, test, production build ---
  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  # --- LLM open-data parsing eval (LangSmith; no model API key required) ---
  llm-evals:
    name: Open-Data Parsing Eval (LangSmith)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync dependencies
        run: uv sync --frozen --extra providers --extra evals
      - name: Run open-data parsing eval
        env:
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT: "dubai-graph-sync-agent"
        run: uv run python -m evals.eval_parsing

  # --- Promote a new revision only after tests + evals pass ---
  deploy-production:
    name: Trigger Remote Production Deploy
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend, llm-evals]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Server Webhook
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref }}", "repo": "${{ github.repository }}"}'
