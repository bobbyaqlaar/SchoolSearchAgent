name: CI — Unit, Frontend & LLM Evals

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  id-token: write

jobs:
  # --- Backend unit tests: fully mocked, no live API keys ---
  unit-tests:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync dependencies (incl. providers + evals)
        run: uv sync --frozen --extra providers --extra evals
      - name: Run pytest
        run: uv run pytest -v

  # --- Frontend: install, test, production build ---
  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  # --- LLM open-data parsing eval (LangSmith; no model API key required) ---
  llm-evals:
    name: Open-Data Parsing Eval (LangSmith)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync dependencies
        run: uv sync --frozen --extra providers --extra evals
      - name: Run open-data parsing eval
        env:
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT: "dubai-graph-sync-agent"
        run: uv run python -m evals.eval_parsing

  # --- Deploy to Cloud Run after tests + evals pass (main only) ---
  deploy-production:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend, llm-evals]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build deploy
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
        run: |
          REGION="${GCP_REGION:-me-central1}"
          gcloud config set project "$GCP_PROJECT_ID"
          gcloud builds submit \
            --project="$GCP_PROJECT_ID" \
            --region="$REGION" \
            --service-account="projects/${GCP_PROJECT_ID}/serviceAccounts/${GCP_SERVICE_ACCOUNT}" \
            --config=deploy/cloudbuild-ci-deploy.yaml \
            --substitutions="_REGION=${REGION},_REPO=dubai,_NEO4J_URI=${NEO4J_URI}"
